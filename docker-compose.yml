services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "4000:4000"
    volumes:
      - ./api/assets:/app/assets
    environment:
      - PORT=4000

  viewer:
    build:
      context: .
      dockerfile: Dockerfile.viewer
    ports:
      - "5173:5173"
    depends_on:
      - api