<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Flipbook</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <!-- <h1>Flipbook</h1> -->

      <div class="toolbar">
        <label for="pdfUrl">PDF API URL</label>
        <input id="pdfUrl" type="text" value="http://api:4000/pdf" />
        <button id="loadBtn">Load</button>
      </div>

      <div class="book-wrap">
        <button id="prevBtn" class="nav">Prev</button>

        <section id="book" class="book">
          <div id="spread" class="spread">
            <canvas id="leftPage"></canvas>
            <canvas id="rightPage"></canvas>
          </div>
          <p id="status" class="status">Load a PDF to start.</p>
        </section>

        <button id="nextBtn" class="nav">Next</button>
      </div>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
